name: Unity Tests

on:
  push:
    paths:
      - "KiarcheContinuumWar/**"
      - ".github/workflows/unity-tests.yml"
  pull_request:
    paths:
      - "KiarcheContinuumWar/**"
      - ".github/workflows/unity-tests.yml"
  workflow_dispatch:

permissions:
  contents: read
  checks: write

jobs:
  unity-tests:
    name: ${{ matrix.testMode }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        testMode:
          - editmode
          - playmode

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: KiarcheContinuumWar/Library
          key: Library-${{ matrix.testMode }}-${{ hashFiles('KiarcheContinuumWar/Packages/packages-lock.json', 'KiarcheContinuumWar/ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-${{ matrix.testMode }}-
            Library-

      - name: Run Unity ${{ matrix.testMode }} tests
        id: tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: KiarcheContinuumWar
          unityVersion: auto
          testMode: ${{ matrix.testMode }}
          artifactsPath: artifacts/${{ matrix.testMode }}
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          checkName: Unity ${{ matrix.testMode }} test results

      - name: Upload Unity ${{ matrix.testMode }} artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unity-${{ matrix.testMode }}-artifacts
          path: ${{ steps.tests.outputs.artifactsPath }}
